<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>🍽️ 오늘 저녁 뭐 먹지?</h1>
        <button class="theme-btn" id="themeBtn">☀️ 라이트모드</button>
      </div>
      <p class="subtitle">버튼을 누르면 오늘 저녁 메뉴를 추천해드려요.</p>

      <button class="recommend-btn" id="recommendBtn">저녁 메뉴 추천받기</button>

      <div class="result" id="result">
        <div class="empty-state">버튼을 눌러 메뉴를 추천받으세요 🍴</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
