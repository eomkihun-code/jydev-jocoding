<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="title-wrap">
          <h1>🎲 로또 번호 추천기 (5게임)</h1>
          <p class="subtitle">버튼을 누르면 1~45 사이에서 5게임 로또 번호를 한 번에 추천해줘.</p>
        </div>
        <button class="theme-btn" id="themeBtn">🌙 다크모드</button>
      </div>

      <div class="action-row">
        <button class="generate-btn" id="generateBtn">5게임 추천 받기</button>
        <button class="copy-btn" id="copyBtn">전체 복사</button>
      </div>

      <label class="bonus-label">
        <input type="checkbox" id="bonusCheck" />
        보너스 번호 포함
      </label>

      <div class="games-grid" id="gamesGrid">
        <div class="empty-state">버튼을 눌러 번호를 추천받으세요</div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
