<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>🍽️ 오늘 저녁 뭐 먹지?</h1>
        <button class="theme-btn" id="themeBtn">☀️ 라이트모드</button>
      </div>
      <p class="subtitle">카테고리를 선택하고 버튼을 눌러 저녁 메뉴를 추천받으세요.</p>

      <div class="filter-group">
        <label class="filter-label">
          <input type="checkbox" name="category" value="random" checked />
          <span>🎲 랜덤</span>
        </label>
        <label class="filter-label">
          <input type="checkbox" name="category" value="korean" />
          <span>🇰🇷 한식</span>
        </label>
        <label class="filter-label">
          <input type="checkbox" name="category" value="chinese" />
          <span>🥢 중식</span>
        </label>
        <label class="filter-label">
          <input type="checkbox" name="category" value="western" />
          <span>🍴 양식</span>
        </label>
        <label class="filter-label">
          <input type="checkbox" name="category" value="japanese" />
          <span>🍱 일식</span>
        </label>
        <label class="filter-label">
          <input type="checkbox" name="category" value="fast" />
          <span>🍔 패스트푸드</span>
        </label>
      </div>

      <button class="recommend-btn" id="recommendBtn">저녁 메뉴 추천받기</button>

      <div class="result" id="result">
        <div class="empty-state">카테고리를 선택하고 버튼을 눌러보세요 🍴</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
